name: Release addon

# On a version tag, package the evaluate_scene editor addon as a drop-in zip and
# attach it to the GitHub release, so games install it without building from source:
# download, extract into the project (gives res://addons/evaluate_scene/), enable.
on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: write

jobs:
  addon:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Package the editor addon
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p staging/addons
          cp -r dev/addons/evaluate_scene staging/addons/evaluate_scene
          # .uid files are editor-generated; drop them so a fresh install regenerates clean ones.
          find staging/addons/evaluate_scene -name '*.uid' -delete
          ( cd staging && zip -r "../evaluate_scene-$version.zip" addons )

      - name: Attach to the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --verify-tag --title "Evaluate $version" --generate-notes
          gh release upload "$GITHUB_REF_NAME" "evaluate_scene-$version.zip" --clobber
