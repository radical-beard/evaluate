name: Publish NuGet

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
      - name: Restore
        run: dotnet restore src/Evaluate/Evaluate.csproj
      - name: Build
        run: dotnet build src/Evaluate/Evaluate.csproj -c Release --no-restore
      - name: Pack
        run: dotnet pack src/Evaluate/Evaluate.csproj -c Release -o artifacts
      - name: Verify version matches tag
        run: |
          set -euo pipefail
          version="$(dotnet msbuild src/Evaluate/Evaluate.csproj -getProperty:Version -nologo)"
          if [ "${GITHUB_REF_TYPE:-}" = "tag" ] && [ "${GITHUB_REF_NAME:-}" != "v$version" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version $version" >&2
            exit 1
          fi
          test -f "artifacts/RadicalBeard.Evaluate.$version.nupkg"
      - name: Publish
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY:-}" ]; then
            echo "NUGET_API_KEY repository/org secret is required to publish to NuGet.org" >&2
            exit 1
          fi
          for package in artifacts/*.nupkg; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate \
              --timeout 600
          done
