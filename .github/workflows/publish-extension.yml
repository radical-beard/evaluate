name: Publish VS Code extension

# Releases the editors/vscode extension to the Open VSX registry (open-vsx.org) — the one
# used by VSCodium, Cursor, Windsurf, Gitpod and Theia. The extension version is kept in
# LOCKSTEP with the library: the single source of truth is <Version> in Directory.Build.props,
# and this workflow stamps package.json from it before packaging. So one `v<version>` tag
# releases everything (NuGet, addon, downloads AND the extension) at the same version —
# there is no separate extension version to bump.
#
# (workflow_dispatch stays as a manual escape hatch — it publishes the current props version.)
#
# Required repository secret:
#   OVSX_PAT  - an open-vsx.org access token (no credit card; created via GitHub/Eclipse login)
#
# (To also publish to the VS Code Marketplace later, add a step:
#    npx @vscode/vsce publish --no-dependencies --packagePath evaluate-evt.vsix -p "$VSCE_PAT"
#  with a VSCE_PAT secret from an Azure DevOps PAT.)
on:
  workflow_dispatch:
  push:
    tags:
      # Same library-release tag as the other workflows (e.g. v0.9.0). The leading-digit
      # class keeps it from matching a stray `vscode-v*` tag.
      - 'v[0-9]*'

permissions:
  contents: read

defaults:
  run:
    working-directory: editors/vscode

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Install
        run: npm ci

      - name: Stamp version from Directory.Build.props (single source of truth)
        run: |
          set -euo pipefail
          version="$(grep -oP '<Version>\K[^<]+' ../../Directory.Build.props)"
          if [ -z "$version" ]; then echo "Could not read <Version> from Directory.Build.props" >&2; exit 1; fi
          echo "Extension version = $version (from Directory.Build.props)"
          npm version "$version" --no-git-tag-version --allow-same-version
          echo "EXT_VERSION=$version" >> "$GITHUB_ENV"

      - name: Verify tag matches version
        if: github.ref_type == 'tag'
        run: |
          set -euo pipefail
          expected="v${EXT_VERSION}"
          if [ "${GITHUB_REF_NAME}" != "$expected" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match Directory.Build.props version ($expected)" >&2
            exit 1
          fi

      - name: Build + package
        run: |
          npm run build
          npx @vscode/vsce package --no-dependencies -o evaluate-evt.vsix

      - name: Publish to Open VSX
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${OVSX_PAT:-}" ]; then
            echo "OVSX_PAT secret not set — add it under Settings ▸ Secrets ▸ Actions." >&2
            exit 1
          fi
          npx ovsx publish evaluate-evt.vsix -p "$OVSX_PAT"
